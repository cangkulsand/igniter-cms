# SonarCloud configuration — Igniter CMS (UTM Part B)
# Verify projectKey/organization in SonarCloud → Project → Information.
# When importing a GitHub repo, SonarCloud usually generates these automatically.
sonar.projectKey=cangkulsand_igniter-cms
sonar.organization=cangkulsand
sonar.projectName=Igniter CMS

# --- Sources under analysis (the project's own hand-written code) ---
sonar.sources=app
sonar.tests=tests

# PHP version (matches local + CI)
sonar.php.version=8.3

# --- Exclusions ---
# original-code/ and refactored-code/ are copies of app/ — scanning them would
# (a) double-count metrics and (b) make duplicate-code detection report 100% dupes.
# Views are templates (HTML); framework migrations excluded from coverage noise.
sonar.exclusions=\
  original-code/**,\
  refactored-code/**,\
  vendor/**,\
  node_modules/**,\
  public/**,\
  writable/**,\
  app/Views/**

sonar.cpd.exclusions=\
  original-code/**,\
  refactored-code/**

# Encoding
sonar.sourceEncoding=UTF-8
